name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx vitest run src
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Start API and web
        working-directory: backend
        run: |
          pip install -r requirements.txt
          uvicorn app.main:app --host 127.0.0.1 --port 18080 &
          cd ../frontend && npm ci && npm run build && npm run start -- -p 13000 &
          sleep 8
      - name: Playwright
        working-directory: frontend
        run: |
          npx playwright install chromium
          npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:13000
          PLAYWRIGHT_API_URL: http://127.0.0.1:18080
