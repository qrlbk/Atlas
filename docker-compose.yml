services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://atlas:atlas@db:5432/atlas
      ENVIRONMENT: local
      SECRET_KEY: dev-local-secret-not-for-production
      ATLAS_SEED_ADMIN_EMAIL: admin@atlas.example.com
      ATLAS_SEED_ADMIN_PASSWORD: AtlasSeed!2026
      ATLAS_SEED_MANAGER_EMAIL: manager@atlas.example.com
      ATLAS_SEED_MANAGER_PASSWORD: AtlasSeed!2026
    depends_on:
      - db
    ports:
      - "18080:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:18080
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:18080
    depends_on:
      - backend
    ports:
      - "13000:3000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "18090:80"

volumes:
  pgdata:
